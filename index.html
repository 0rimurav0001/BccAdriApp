
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>BCC Academic Portal</title>
      <style>
        html, body { height: 100%; margin: 0; background: #ffffff; }
        #root { height: 100%; }
        #loading-screen {
          position: fixed; inset: 0; display: flex; flex-direction: column;
          align-items: center; justify-content: center; background: white; z-index: 9999;
        }
      </style>
      <script>
        // Global error catcher for legacy devices
        window.onerror = function(msg, url, line, col, error) {
          var errorBox = document.getElementById('error-box');
          if (errorBox) {
            errorBox.style.display = 'block';
            errorBox.innerText = 'Launch Error: ' + msg + '\nLine: ' + line;
          }
          console.error('BCC BOOT ERROR:', msg, error);
        };
      </script>
    </head>

    <body>
      <div id="loading-screen">
        <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #22c55e; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-family: sans-serif; font-weight: bold; color: #666;">Starting Portal...</p>
        <div id="error-box" style="display: none; margin-top: 20px; color: red; font-family: monospace; font-size: 12px; padding: 10px; background: #fff1f2; border: 1px solid #fda4af; border-radius: 8px; max-width: 80%;"></div>
      </div>
      <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
